<!DOCTYPE html>
<html lang="ru" data-theme="dark" data-accent="blue">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/GrafikSmen/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0b1228">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="График">
  <link rel="apple-touch-icon" href="/GrafikSmen/apple-touch-icon.png">

  <!-- Android PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="График">

  <title>График смен</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <a href="#main" class="skip-link">Перейти к основному содержимому</a>

  <header class="app-header">
    <div class="header-top">
      <h1 class="app-title">📅 График смен</h1>
      <div class="header-actions">
        <button id="btn-install" class="install-btn hidden" aria-label="Установить приложение" title="Установить">⬇️</button>
        <button id="theme-toggle" class="theme-btn" aria-label="Сменить тему">🌙</button>
      </div>
    </div>
    <select id="position-select" class="position-select" aria-label="Выберите должность">
      <option value="">— Выберите должность —</option>
    </select>
  </header>

  <main id="main" class="main">

    <!-- 1. КАЛЕНДАРЬ -->
    <div class="card calendar-card">
      <div class="month-nav">
        <button class="month-nav-btn" id="prev-month">‹</button>
        <span id="month-name" class="month-name"></span>
        <button class="month-nav-btn" id="next-month">›</button>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
      <div class="legend" id="legend"></div>
    </div>

    <!-- 2. НАСТРОЙКИ ГРАФИКА -->
    <div class="card">
      <button id="toggle-settings" class="toggle-btn">
        <span>⚙️ Настройка графика</span>
        <span class="chevron" id="chevron">›</span>
      </button>
      <div id="settings-panel" class="collapsible">
        <div class="collapsible-inner">
          <label class="field-label">Дата начала цикла</label>
          <input type="date" id="cycle-start" class="input-field">

          <label class="field-label">Тип смены в эту дату</label>
          <div id="cycle-type-buttons" class="shift-grid shift-grid-5">
            <button type="button" class="shift-btn shift-day" data-type="day">День</button>
            <button type="button" class="shift-btn shift-night" data-type="night">Ночь</button>
            <button type="button" class="shift-btn shift-sleep" data-type="sleep">Отсыпной</button>
            <button type="button" class="shift-btn shift-off" data-type="off">Выходной</button>
            <button type="button" class="shift-btn shift-extra" data-type="extra">Доп.</button>
          </div>

          <div class="row-buttons">
            <button id="btn-apply-cycle" class="btn-primary">Применить</button>
            <button id="btn-clear-month" class="btn-danger">Очистить</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 3. ДОЛЖНОСТИ -->
    <div class="card">
      <button id="toggle-positions" class="toggle-btn">
        <span>👔 Должности и оклад</span>
        <span class="chevron">›</span>
      </button>
      <div id="positions-panel" class="collapsible">
        <div class="collapsible-inner">
          <div id="positions-list" class="positions-list"></div>
          <button id="btn-add-position" class="btn-primary">＋ Добавить должность</button>
        </div>
      </div>
    </div>

    <!-- 4. ОФОРМЛЕНИЕ -->
    <div class="card">
      <button id="toggle-theme" class="toggle-btn">
        <span>🎨 Оформление</span>
        <span class="chevron">›</span>
      </button>
      <div id="theme-panel" class="collapsible">
        <div class="collapsible-inner">

          <div class="mode-switch">
            <button class="mode-sw-btn" data-mode="light">☀️ Светлая</button>
            <button class="mode-sw-btn" data-mode="dark">🌙 Тёмная</button>
          </div>

          <label class="field-label">Светлые темы</label>
          <div class="theme-grid">
            <button class="theme-tile" data-theme="light" data-accent="blue">
              <span class="tile-preview tp-light-blue"></span><span>Небо</span>
            </button>
            <button class="theme-tile" data-theme="light" data-accent="green">
              <span class="tile-preview tp-light-green"></span><span>Мята</span>
            </button>
            <button class="theme-tile" data-theme="light" data-accent="peach">
              <span class="tile-preview tp-light-peach"></span><span>Персик</span>
            </button>
            <button class="theme-tile" data-theme="light" data-accent="lavender">
              <span class="tile-preview tp-light-lavender"></span><span>Лаванда</span>
            </button>
          </div>

          <label class="field-label">Тёмные темы</label>
          <div class="theme-grid">
            <button class="theme-tile" data-theme="dark" data-accent="blue">
              <span class="tile-preview tp-dark-blue"></span><span>Полночь</span>
            </button>
            <button class="theme-tile" data-theme="dark" data-accent="purple">
              <span class="tile-preview tp-dark-purple"></span><span>Аметист</span>
            </button>
            <button class="theme-tile" data-theme="dark" data-accent="green">
              <span class="tile-preview tp-dark-green"></span><span>Лес</span>
            </button>
            <button class="theme-tile" data-theme="dark" data-accent="rose">
              <span class="tile-preview tp-dark-rose"></span><span>Закат</span>
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- 5. ИТОГИ -->
    <div class="card">
      <h2 class="card-title">📊 Итоги месяца</h2>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-value" id="stat-workdays">0</div>
          <div class="summary-label">Раб. дней</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="stat-hours">0</div>
          <div class="summary-label">Часов</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="stat-nights">0</div>
          <div class="summary-label">Ночных</div>
        </div>
      </div>
    </div>

    <!-- 6. ЗАРПЛАТА -->
    <div class="card">
      <h2 class="card-title">💰 Расчёт зарплаты</h2>
      <div class="calc-section">
        <div class="calc-row">
          <span class="calc-row-label">Часов (авто)</span>
          <span class="calc-row-value" id="calc-auto-hours">0</span>
        </div>
        <div class="calc-row">
          <span class="calc-row-label">Оклад</span>
          <span class="calc-row-value" id="calc-salary">—</span>
        </div>
        <div class="calc-row">
          <span class="calc-row-label">Норма часов</span>
          <span class="calc-row-value" id="calc-norm">165 ч</span>
        </div>

        <label class="field-label">КТУ (коэффициент)</label>
        <input type="number" id="ktu-input" class="input-field" step="0.1" min="0" max="10" placeholder="Например, 1.0">

        <div class="salary-card">
          <div class="salary-label-text">ИТОГО К ВЫПЛАТЕ</div>
          <div class="salary-amount" id="salary-total">0 ₽</div>
          <div class="salary-formula" id="salary-formula"></div>
        </div>

        <div class="actions">
          <button id="btn-export" class="action-btn">📤 CSV</button>
          <button id="btn-backup" class="action-btn">💾 Бэкап</button>
          <button id="btn-restore" class="action-btn">📥 Восстановить</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="app-footer">
    <span class="app-version" id="app-version">v3.5</span>
  </footer>

  <!-- iOS Баннер -->
  <div id="ios-banner" class="ios-banner">
    <div>📲 Нажмите <b>Поделиться</b> ↑ → <b>На экран «Домой»</b></div>
    <button id="ios-close" class="ios-btn">OK</button>
  </div>

  <!-- МОДАЛКА: Редактор дня -->
  <div id="day-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modal-title">Редактирование смены</div>
      <div class="modal-date-info" id="modal-date"></div>

      <div class="modal-section">
        <div class="modal-section-title">Тип смены</div>
        <div class="shift-grid shift-grid-5" id="shift-grid"></div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Фактические часы (зачёт)</div>
        <div class="hours-adjuster">
          <button class="adj-btn" id="adj-minus">−</button>
          <input type="number" id="adj-hours" class="adj-input" step="0.5" min="0" max="24">
          <button class="adj-btn" id="adj-plus">+</button>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Заметка</div>
        <textarea id="day-note" class="input-field textarea" placeholder="Необязательное примечание"></textarea>
      </div>

      <div class="modal-actions">
        <button id="btn-save-day" class="btn-primary">Сохранить</button>
        <button id="btn-cancel-day" class="btn-ghost">Отмена</button>
      </div>
    </div>
  </div>

  <!-- МОДАЛКА: Редактор должности -->
  <div id="position-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="position-modal-title">Должность</div>

      <div class="modal-section">
        <label class="field-label">Название</label>
        <input type="text" id="pos-name" class="input-field" placeholder="Например, Грузчик">

        <label class="field-label">Оклад, ₽</label>
        <input type="number" id="pos-salary" class="input-field" placeholder="33850" min="0" step="100">

        <label class="field-label">Часы в смене</label>
        <input type="number" id="pos-hours" class="input-field" placeholder="11" min="1" max="24" step="0.5">

        <label class="field-label">Тип графика</label>
        <div class="mode-switch">
          <button class="pos-type-btn" data-pt="cyclic">🔄 Цикл</button>
          <button class="pos-type-btn" data-pt="5x2">📅 5 / 2</button>
        </div>

        <div id="cycle-editor-block">
          <label class="field-label">Цикл смен</label>
          <div id="cycle-preview" class="cycle-preview"></div>
          <div class="cycle-add-row">
            <button class="add-shift-btn" data-add="day">+ День</button>
            <button class="add-shift-btn" data-add="night">+ Ночь</button>
            <button class="add-shift-btn" data-add="sleep">+ Отсыпной</button>
            <button class="add-shift-btn" data-add="off">+ Выходной</button>
            <button class="add-shift-btn" data-add="extra">+ Доп.</button>
          </div>
          <button id="btn-cycle-clear" class="btn-ghost full">Очистить цикл</button>
        </div>
      </div>

      <div class="modal-actions">
        <button id="btn-save-position" class="btn-primary">Сохранить</button>
        <button id="btn-delete-position" class="btn-danger">Удалить</button>
        <button id="btn-cancel-position" class="btn-ghost">Отмена</button>
      </div>
    </div>
  </div>

  <script src="./app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/GrafikSmen/sw.js', { scope: '/GrafikSmen/' })
          .then(reg => { console.log('[SW] Зарегистрирован:', reg.scope); reg.update(); })
          .catch(err => console.error('[SW] Ошибка:', err));
      });
    }
  </script>
</body>
</html>
