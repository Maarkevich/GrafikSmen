<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <!-- PWA -->
  <link rel="manifest" href="/GrafikSmen/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="График">
  <link rel="apple-touch-icon" href="/GrafikSmen/apple-touch-icon.png">

  <title>График смен</title>

  <link rel="stylesheet" href="./styles.css">
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-top">
    <h1 class="app-title">📅 График смен</h1>

    <div class="header-actions">
      <button id="btn-install" class="install-btn hidden">⬇️</button>
      <button id="theme-toggle" class="theme-btn">🌙</button>
    </div>
  </div>

  <select id="position-select" class="position-select"></select>
</header>

<!-- MAIN -->
<main class="main">

  <!-- КАЛЕНДАРЬ -->
  <div class="card">
    <div class="month-nav">
      <button id="prev-month">‹</button>
      <div id="month-name"></div>
      <button id="next-month">›</button>
    </div>

    <div id="calendar-grid" class="calendar-grid"></div>
  </div>

  <!-- НАСТРОЙКА ГРАФИКА -->
  <div class="card">
    <button id="toggle-settings" class="toggle-btn">
      ⚙️ Настройка графика
    </button>

    <div id="settings-panel" class="collapsible">

      <label>Дата начала цикла</label>
      <input type="date" id="cycle-start" class="input-field">

      <label>Тип смены</label>
      <select id="cycle-type" class="input-field">
        <option value="">Выбрать</option>
        <option value="day">День</option>
        <option value="night">Ночь</option>
        <option value="sleep">Отсыпной</option>
        <option value="off">Выходной</option>
      </select>

      <button id="btn-apply-cycle" class="btn-primary">Применить</button>
      <button id="btn-clear-month" class="btn-danger">Очистить</button>

    </div>
  </div>

  <!-- ОФОРМЛЕНИЕ -->
  <div class="card">
    <button id="toggle-theme" class="toggle-btn">
      🎨 Оформление
    </button>

    <div id="theme-panel" class="collapsible">

      <button class="theme-option" data-theme="dark" data-accent="blue">🌌 Тёмная синяя</button>
      <button class="theme-option" data-theme="dark" data-accent="purple">🌃 Тёмная фиолет</button>
      <button class="theme-option" data-theme="light" data-accent="blue">🌤 Светлая синяя</button>
      <button class="theme-option" data-theme="light" data-accent="green">🌿 Светлая зелёная</button>

    </div>
  </div>

  <!-- ИТОГИ -->
  <div class="card">
    <h2>Итоги</h2>

    <div class="summary">
      <div>Дней: <span id="stat-workdays">0</span></div>
      <div>Часов: <span id="stat-hours">0</span></div>
      <div>Ночей: <span id="stat-nights">0</span></div>
    </div>
  </div>

  <!-- ЗАРПЛАТА -->
  <div class="card">
    <h2>Зарплата</h2>

    <div>Оклад: <span id="calc-salary">—</span></div>

    <label>КТУ</label>
    <input type="number" id="ktu-input" class="input-field" step="0.1" value="1">

    <div class="salary-result" id="salary-total">0 ₽</div>

    <div class="actions">
      <button id="btn-export">📤 CSV</button>
      <button id="btn-backup">💾 Бэкап</button>
      <button id="btn-restore">📥 Восстановить</button>
    </div>
  </div>

</main>

<!-- FOOTER -->
<footer class="app-footer">
  <span id="app-version"></span>
</footer>

<!-- МОДАЛКА -->
<div id="day-modal" class="modal-overlay hidden">
  <div class="modal">

    <div id="modal-date"></div>

    <div class="shift-grid">
      <button class="shift-btn" data-type="day">День</button>
      <button class="shift-btn" data-type="night">Ночь</button>
      <button class="shift-btn" data-type="sleep">Отсыпной</button>
      <button class="shift-btn" data-type="off">Выходной</button>
      <button class="shift-btn" data-type="extra">Доп.</button>
    </div>

    <textarea id="day-note" class="input-field" placeholder="Заметка"></textarea>

    <button id="btn-save-day">Сохранить</button>
    <button id="btn-cancel-day">Отмена</button>

  </div>
</div>

<!-- SCRIPTS -->
<script src="./app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/GrafikSmen/sw.js');
}
</script>

</body>
</html>
