<!DOCTYPE html>
<html lang="ru" data-theme="light" data-accent="blue">
<head>
  <meta charset="UTF-8">

  <!-- PWA -->
  <link rel="manifest" href="/GrafikSmen/manifest.json">
  <meta name="theme-color" content="#0a84ff">

  <!-- viewport FIX (чёлка) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="График">
  <link rel="apple-touch-icon" href="/GrafikSmen/apple-touch-icon.png">

  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes">

  <title>График смен</title>

  <link rel="stylesheet" href="./styles.css">
</head>

<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-top">
    <h1 class="app-title">📅 График смен</h1>

    <div class="header-actions">
      <button id="btn-install" class="install-btn hidden">⬇️</button>
      <button id="theme-toggle" class="theme-btn">🌙</button>
    </div>
  </div>

  <select id="position-select" class="position-select">
    <option value="">— Выберите должность —</option>
  </select>
</header>

<!-- MAIN -->
<main class="main">

  <!-- режим -->
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="schedule">📅 График</button>
    <button class="mode-btn" data-mode="manual">✏️ Вручную</button>
  </div>

  <!-- КАЛЕНДАРЬ -->
  <div class="card">
    <div class="month-nav">
      <button id="prev-month" class="month-nav-btn">‹</button>
      <div id="month-name"></div>
      <button id="next-month" class="month-nav-btn">›</button>
    </div>

    <div id="calendar-grid" class="calendar-grid"></div>
  </div>

  <!-- НАСТРОЙКИ -->
  <div class="card">
    <button id="toggle-settings" class="section-btn">
      ⚙️ Настройка графика
      <span id="chevron-settings">▾</span>
    </button>

    <div id="settings-panel" class="collapsible">
      <div class="settings-panel">

        <label>Дата начала цикла</label>
        <input type="date" id="cycle-start" class="input-field">

        <label>Тип смены</label>
        <select id="cycle-type" class="input-field"></select>

        <button id="btn-apply-cycle" class="btn-primary">Применить</button>
        <button id="btn-clear-month" class="btn-danger">Очистить месяц</button>

      </div>
    </div>
  </div>

  <!-- ОФОРМЛЕНИЕ -->
  <div class="card">
    <button id="toggle-theme-panel" class="section-btn">
      🎨 Оформление
      <span id="chevron-theme">▾</span>
    </button>

    <div id="theme-panel" class="collapsible">
      <div class="settings-panel">

        <label>Светлая тема</label>
        <div class="theme-grid">
          <button class="theme-option" data-theme="light" data-accent="blue"></button>
          <button class="theme-option" data-theme="light" data-accent="purple"></button>
          <button class="theme-option" data-theme="light" data-accent="green"></button>
          <button class="theme-option" data-theme="light" data-accent="orange"></button>
        </div>

        <label>Тёмная тема</label>
        <div class="theme-grid">
          <button class="theme-option" data-theme="dark" data-accent="blue"></button>
          <button class="theme-option" data-theme="dark" data-accent="purple"></button>
          <button class="theme-option" data-theme="dark" data-accent="green"></button>
          <button class="theme-option" data-theme="dark" data-accent="orange"></button>
        </div>

      </div>
    </div>
  </div>

  <!-- ИТОГИ -->
  <div class="card">
    <div class="card-header">Итоги</div>

    <div class="summary-grid">
      <div>
        <div id="stat-workdays">0</div>
        <div>Дней</div>
      </div>
      <div>
        <div id="stat-hours">0</div>
        <div>Часов</div>
      </div>
      <div>
        <div id="stat-nights">0</div>
        <div>Ночей</div>
      </div>
    </div>
  </div>

  <!-- ЗАРПЛАТА -->
  <div class="card">
    <div class="card-header">Зарплата</div>

    <div class="calc-section">
      <div class="calc-row">
        <span>Часы</span>
        <span id="calc-auto-hours">0</span>
      </div>

      <div class="calc-row">
        <span>Оклад</span>
        <span id="calc-salary">—</span>
      </div>

      <label>КТУ</label>
      <input id="ktu-input" type="number" step="0.1" class="input-field">

      <div class="salary-card">
        <div id="salary-total">0 ₽</div>
      </div>

      <div class="actions-row">
        <button id="btn-export" class="btn-secondary">CSV</button>
        <button id="btn-backup" class="btn-secondary">Бэкап</button>
        <button id="btn-restore" class="btn-secondary">Восст</button>
      </div>
    </div>
  </div>

</main>

<footer class="app-footer">
  <span id="app-version">v4.8</span>
</footer>

<!-- iOS banner -->
<div id="ios-banner" class="ios-banner">
  <div>Добавьте на экран «Домой»</div>
  <button id="ios-close">OK</button>
</div>

<!-- MODAL -->
<div id="day-modal" class="modal-overlay hidden">
  <div class="modal">
    <div id="modal-date"></div>
    <div id="shift-grid"></div>

    <input id="adj-hours" type="number" class="input-field">

    <textarea id="day-note" class="input-field"></textarea>

    <button id="btn-save-day" class="btn-primary">Сохранить</button>
    <button id="btn-cancel-day" class="btn-secondary">Отмена</button>
  </div>
</div>

<script src="./app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/GrafikSmen/sw.js');
}
</script>

</body>
</html>
